name: Retry Pages deployment

on:
  workflow_run:
    workflows:
      - Deploy MkDocs to GitHub Pages
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  retry:
    if: >-
      contains(fromJSON('["failure", "timed_out"]'), github.event.workflow_run.conclusion) &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Retry failed Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          latest_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"

          if [ "${RUN_SHA}" != "${latest_sha}" ]; then
            echo "A newer main commit exists; skipping retry for ${RUN_SHA}."
            exit 0
          fi

          failed_jobs="$(gh run view "${RUN_ID}" --repo "${REPOSITORY}" --json jobs --jq '.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out") | .name')"

          if ! printf '%s\n' "${failed_jobs}" | grep -qx "deploy"; then
            echo "Deploy job did not fail; skipping retry."
            exit 0
          fi

          if printf '%s\n' "${failed_jobs}" | grep -qvx "deploy"; then
            echo "Another job failed; skipping retry."
            exit 0
          fi

          echo "Retrying Pages deployment, attempt $((RUN_ATTEMPT + 1)) of 3."
          gh run rerun "${RUN_ID}" --repo "${REPOSITORY}" --failed
