<section class="newsletter-cta" aria-labelledby="newsletter-cta-title">
  <div>
    <span class="newsletter-cta__eyebrow">Newsletter</span>
    <h2 id="newsletter-cta-title">Suivre les actualités de la médiation scientifique</h2>
    <p>Recevez les prochaines ressources, événements et nouvelles publications de l’équipe.</p>
  </div>
  <form class="newsletter-cta__form" action="#" method="get">
    <label class="newsletter-cta__label" for="newsletter-email">Adresse email</label>
    <div class="newsletter-cta__fields">
      <input id="newsletter-email" name="email" type="email" autocomplete="email" placeholder="prenom.nom@example.fr" required>
      <button class="newsletter-cta__button" type="submit">S’inscrire</button>
    </div>
  </form>
</section>
