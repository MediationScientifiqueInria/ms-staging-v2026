site_name: Médiation scientifique - Inria

extra:
  noindex: !ENV [MKDOCS_NO_INDEX, false]

exclude_docs: |
  contenus/evenements/**

theme:
  font:
    text: InriaSans-Regular

  logo: assets/images/Inria-mediation.png
  favicon: assets/images/favicon.ico
  name: material
  custom_dir: src/overrides
  palette:
    primary: custom
    accent: custom

  language: fr

  features:
    #- navigation.path
    - navigation.indexes
    #- navigation.top
    #- navigation.footer
    #- toc.integrate
    #- navigation.tabs
    #- navigation.tabs.sticky
    - navigation.sections

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/analytics/matomo.js
  - assets/javascripts/calendar/home-calendar.js

hooks:
  - scripts/build/calendar_events.py



markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - def_list
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - md_in_html
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true


plugins:
    - mkdocs-video
    - awesome-pages
    - glightbox
    - table-reader
    - blog:
        blog_dir: contenus/ressources
        blog_toc: true
        post_date_format: long
        post_url_format: "{slug}"
        authors: false
        pagination_per_page: 12
    - blog:
        blog_dir: contenus/actualites
        blog_toc: true
        post_date_format: long
        post_url_format: "{slug}"
        authors: false
        pagination_per_page: 12
    # - search # necessary for search to work
