backend:
  name: github
  repo: MediationScientifiqueInria/ms-staging-v2026
  branch: staging
  base_url: https://sveltia-cms-auth.pages.dev

media_folder: docs/assets/images
public_folder: assets/images

locale: fr

# Champs partagés entre Ressources et Actualités
# (dupliqués car Sveltia ne supporte pas les ancres YAML pour les collections)

collections:

  # ─── PARTENAIRES ─────────────────────────────────────────────────────────
  - name: partenaires
    label: Partenaires
    files:
      - name: liste
        label: Liste des partenaires
        file: docs/contenus/partenaires.yml
        fields:
          - label: Partenaires
            name: partenaires
            widget: list
            summary: "{{fields.nom}}"
            fields:
              - label: Nom
                name: nom
                widget: string

              - label: Logo
                name: logo
                widget: image
                required: false
                hint: "Logo du partenaire. Si vide, le nom s'affichera en texte."

              - label: Mettre en avant
                name: afficher_accueil
                widget: boolean
                default: true
                required: false
                hint: "Affiche ce partenaire dans le carousel de la page d'accueil"

              - label: Lien
                name: url
                widget: string
                required: false
                hint: "Site du partenaire, optionnel"

  # ─── À LA UNE ─────────────────────────────────────────────────────────────
  - name: a_la_une
    label: À la une
    files:
      - name: accueil
        label: Page d'accueil
        file: docs/contenus/a-la-une.yml
        fields:
          - label: Contenus à afficher
            name: items
            widget: list
            required: false
            max: 4
            hint: "Choisir jusqu'à 4 actualités ou événements pour le grand carrousel de l'accueil"
            fields:
              - label: Type de contenu
                name: type
                widget: select
                options:
                  - label: Actualité
                    value: actualite
                  - label: Événement
                    value: evenement

              - label: Actualité
                name: actualite
                widget: relation
                collection: actualites
                search_fields:
                  - title
                value_field: title
                display_fields:
                  - title
                required: false
                hint: "À remplir si le type choisi est Actualité"

              - label: Événement
                name: evenement
                widget: relation
                collection: calendrier
                search_fields:
                  - title
                value_field: title
                display_fields:
                  - title
                required: false
                hint: "À remplir si le type choisi est Événement"

  # ─── NOUS CONNAÎTRE ──────────────────────────────────────────────────────
  - name: bilans
    label: Bilans
    label_singular: Bilan
    folder: docs/bilans/posts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Titre
        name: title
        widget: string

      - label: Image de couverture
        name: cover_image
        widget: image
        required: false

      - label: Contenu
        name: body
        widget: markdown
        required: true
        hint: "⚠️ Champ obligatoire — le site ne peut pas afficher un bilan sans contenu"

      - label: Date de publication
        name: date
        widget: datetime
        default: "{{now}}"
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false

      - label: Langue
        name: langue
        widget: select
        options:
          - label: Français
            value: fr
          - label: Anglais
            value: en
          - label: Bilingue (FR/EN)
            value: fr-en
        default: fr

      - label: Auteur / Producteur
        name: auteur
        widget: string
        default: Inria - Médiation Scientifique
        required: false

      - label: Thématiques
        name: thematiques
        widget: list
        required: false

      - label: Type
        name: tags
        widget: select
        multiple: true
        options:
          - Bilan annuel
          - Bilan d'action
          - Infographie
          - Retour d'expérience
          - Autre
        required: false

      - label: URL externe
        name: url_externe
        widget: string
        required: false
        hint: "Lien externe optionnel si le bilan est consultable ailleurs"

      - label: Source externe
        name: source
        widget: string
        required: false

  - name: docs_reference
    label: Docs de référence
    label_singular: Doc de référence
    folder: docs/docs/posts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Titre
        name: title
        widget: string

      - label: Image de couverture
        name: cover_image
        widget: image
        required: false

      - label: Contenu
        name: body
        widget: markdown
        required: true
        hint: "⚠️ Champ obligatoire — le site ne peut pas afficher un document sans contenu"

      - label: Date de publication
        name: date
        widget: datetime
        default: "{{now}}"
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false

      - label: Langue
        name: langue
        widget: select
        options:
          - label: Français
            value: fr
          - label: Anglais
            value: en
          - label: Bilingue (FR/EN)
            value: fr-en
        default: fr

      - label: Auteur / Producteur
        name: auteur
        widget: string
        default: Inria - Médiation Scientifique
        required: false

      - label: Thématiques
        name: thematiques
        widget: list
        required: false

      - label: Type
        name: tags
        widget: select
        multiple: true
        options:
          - Document de référence
          - Guide
          - Charte
          - Méthodologie
          - Ressource externe
          - Autre
        required: false

      - label: Support
        name: support
        widget: select
        multiple: true
        options:
          - PDF
          - Page web
          - Document
          - Tableau
          - Autre
        required: false

      - label: URL externe
        name: url_externe
        widget: string
        required: false
        hint: "Lien externe optionnel si le document est consultable ailleurs"

      - label: Source externe
        name: source
        widget: string
        required: false

  # ─── RESSOURCES ───────────────────────────────────────────────────────────
  - name: ressources
    label: Ressources
    label_singular: Ressource
    folder: docs/contenus/ressources/posts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Titre
        name: title
        widget: string

      - label: Image de couverture
        name: cover_image
        widget: image
        required: false

      - label: Contenu
        name: body
        widget: markdown
        required: true
        hint: "⚠️ Champ obligatoire — le site ne peut pas afficher une ressource sans contenu"

      - label: Type
        name: tags
        widget: select
        multiple: true
        options:
          - Ressource pédagogique
          - Outil
          - Publication
          - Exposition
          - Jeu
          - Vidéo
          - MOOC
          - Atelier
          - Autre
        hint: "Type de ressource (utilisé comme filtre)"

      - label: Date de publication
        name: date
        widget: datetime
        default: "{{now}}"
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false
        hint: "Date de mise en ligne sur le site"

      - label: Langue
        name: langue
        widget: select
        options:
          - label: Français
            value: fr
          - label: Anglais
            value: en
          - label: Bilingue (FR/EN)
            value: fr-en
        default: fr

      - label: Auteur / Producteur
        name: auteur
        widget: select
        required: true
        default: Inria - Médiation Scientifique
        options:
          - Inria - Médiation Scientifique
          - Co-production Inria
        hint: "Sélectionner la nature de la production"

      - label: Autre auteur / producteur
        name: auteur_autre
        widget: string
        required: false
        hint: "À remplir si l'auteur ou le producteur n'est pas dans la liste"

      - label: Contact pour précision
        name: contact
        widget: string
        required: false
        hint: "Email ou nom de la personne à contacter"

      - label: Référent scientifique
        name: referent_scientifique
        widget: string
        required: false

      - label: Thématiques scientifiques
        name: thematiques
        widget: list
        required: false
        hint: "Thématiques issues de la cartographie (ex : Intelligence artificielle, Algorithmique...)"

      - label: Domaines grand public
        name: domaines
        widget: list
        required: false
        hint: "Domaines selon Interstices (ex : Société numérique, Jeux...)"

      - label: Cibles
        name: cibles
        widget: list
        required: false
        hint: "Public visé (ex : Lycéens, Cycle 3, Enseignants, Grand public...)"

      - label: Centre / Territoire
        name: territoire
        widget: list
        required: false
        hint: "Centre Inria ou territoire concerné (ex : Paris, Grenoble, Île-de-France...)"

      - label: Support
        name: support
        widget: select
        multiple: true
        options:
          - Physique
          - Numérique (à télécharger)
          - En ligne
          - Empruntable (en prêt)
          - Duplicable
        required: false

      - label: URL externe
        name: url_externe
        widget: string
        required: false
        hint: "Lien vers la ressource externe, si elle est consultable hors du site"

      - label: Source externe
        name: source
        widget: string
        required: false
        hint: "Nom du site, organisme ou producteur affiche sur la carte"

  # ─── ACTUALITÉS ───────────────────────────────────────────────────────────
  - name: actualites
    label: Actualités
    label_singular: Actualité
    folder: docs/contenus/actualites/posts
    create: true
    slug: "{{slug}}"
    view_filters:
      - label: À la une
        field: featured
        pattern: true
    fields:
      - label: Titre
        name: title
        widget: string

      - label: Image de couverture
        name: cover_image
        widget: image
        required: false

      - label: Contenu
        name: body
        widget: markdown
        required: true
        hint: "⚠️ Champ obligatoire — le site ne peut pas afficher une actualité sans contenu"

      - label: Mettre à la une
        name: featured
        widget: boolean
        default: false
        required: false
        hint: "Affiche ce contenu dans le grand carrousel À la une de la page d'accueil"

      - label: Date de publication
        name: date
        widget: datetime
        default: "{{now}}"
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false

      - label: Langue
        name: langue
        widget: select
        options:
          - label: Français
            value: fr
          - label: Anglais
            value: en
        default: fr

      - label: Auteur / Producteur
        name: auteur
        widget: select
        required: true
        default: Inria - Médiation Scientifique
        options:
          - Inria - Médiation Scientifique
          - Co-production Inria

      - label: Autre auteur / producteur
        name: auteur_autre
        widget: string
        required: false

      - label: Contact pour précision
        name: contact
        widget: string
        required: false

      - label: Référent scientifique
        name: referent_scientifique
        widget: string
        required: false

      - label: Thématiques scientifiques
        name: thematiques
        widget: list
        required: false

      - label: Domaines grand public
        name: domaines
        widget: list
        required: false

      - label: Cibles
        name: cibles
        widget: list
        required: false

      - label: Centre / Territoire
        name: territoire
        widget: list
        required: false

  # ─── ÉVÉNEMENTS ─────────────────────────────────────────────────────────
  - name: calendrier
    label: Événements
    label_singular: Événement
    folder: docs/contenus/evenements
    create: true
    slug: "{{date_debut}}-{{slug}}"
    summary: "{{title}} — {{date_debut}}"
    view_filters:
      - label: À la une
        field: featured
        pattern: true
      - label: Publiés
        field: publie
        pattern: true
    editor:
      preview: false
    fields:
      - label: Publié
        name: publie
        widget: boolean
        default: true

      - label: Mettre à la une
        name: featured
        widget: boolean
        default: false
        required: false
        hint: "Affiche cet événement dans le grand carrousel À la une de la page d'accueil"

      - label: Titre
        name: title
        widget: string

      - label: Image de couverture
        name: cover_image
        widget: image
        required: false
        hint: "Image utilisée sur les cartes. Les images du contenu se gèrent directement dans le champ Contenu."

      - label: Contenu
        name: body
        widget: markdown
        required: false
        hint: "Texte libre de l'événement. Les images insérées ici s'affichent dans l'ordre où elles sont placées."

      - label: Date de publication
        name: date_publication
        widget: datetime
        default: "{{now}}"
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false
        required: false
        hint: "Date utilisée pour classer l'événement dans le flux Actualités. Si vide, la date d'ajout du fichier est utilisée."

      - label: Date de début
        name: date_debut
        widget: datetime
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false

      - label: Toute la journée
        name: toute_la_journee
        widget: boolean
        default: false
        required: false
        hint: "À cocher si l'événement n'a pas d'heure précise"

      - label: Heure de début
